<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Novaline</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .not-found {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 24px;
            background: var(--paper);
        }

        .not-found-inner {
            max-width: 420px;
        }

        .not-found-code {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-4);
            margin-bottom: 20px;
        }

        .not-found h1 {
            font-size: clamp(22px, 3vw, 30px);
            font-weight: 700;
            letter-spacing: -.025em;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .not-found p {
            font-size: 13px;
            line-height: 1.75;
            color: var(--ink-3);
            margin-bottom: 32px;
        }

        .not-found-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="not-found">
    <div class="not-found-inner">
        <div class="not-found-code">404 — Page not found</div>
        <h1>That page doesn't exist.</h1>
        <p>The page you're looking for may have moved or never existed. Head back to the homepage or get in touch
            directly.</p>
        <div class="not-found-actions">
            <a href="/" class="btn btn-primary btn-lg">Back to homepage</a>
            <a href="/#contact" class="btn btn-lg">Contact us</a>
        </div>
    </div>
</div>
</body>
</html>
